<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtGen — Project</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <h1>⚡ ArtGen</h1>
            <div class="project-name" id="sidebar-project-name">No project</div>
            <div class="nav-section">Pipeline</div>
            <a href="/" class="active"><span class="step-dot" id="dot-step0"></span>0. Project</a>
            <a href="/step/1" class="step-link"><span class="step-dot idle" id="dot-step1"></span>1. Outline</a>
            <a href="/step/2" class="step-link"><span class="step-dot idle" id="dot-step2"></span>2. Draft</a>
            <a href="/step/3" class="step-link"><span class="step-dot idle" id="dot-step3"></span>3. Article Draft</a>
            <a href="/step/4" class="step-link"><span class="step-dot idle" id="dot-step4"></span>4. Style Rewrite</a>
            <a href="/step/5" class="step-link"><span class="step-dot idle" id="dot-step5"></span>5. Images</a>
            <div class="nav-section">System</div>
            <a href="/settings">⚙ Settings</a>
            <a href="/log">📋 System Log</a>
        </nav>

        <div id="main">
            <div id="content">
                <div class="page-header">
                    <h1>0. Project</h1>
                    <p>Create, load, or delete projects</p>
                </div>

                <!-- Current Project -->
                <div class="card" id="current-project-card" style="display:none;">
                    <h2>📌 Current Project</h2>
                    <div id="current-project-info"></div>
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <button id="save-project-btn">💾 Save</button>
                    </div>
                    <span id="save-status"></span>
                </div>

                <!-- New Project -->
                <div class="card">
                    <h2>➕ New Project</h2>
                    <div class="form-group">
                        <label for="project-name">Project Name (leave blank for auto-generated)</label>
                        <input type="text" id="project-name" placeholder="e.g., Space Exploration History">
                    </div>
                    <button id="create-project-btn">Create Project</button>
                    <span id="create-status"></span>
                </div>

                <!-- All Projects -->
                <div class="card">
                    <h2>📂 All Projects</h2>
                    <div id="project-list">
                        <p style="color:var(--text-secondary)">No projects yet. Create one above.</p>
                    </div>
                </div>
            </div>
            <div id="log-widget-header">
                <span><button id="toggle-log-btn" class="toggle-log-btn">▶ Show</button> System Log</span>
                <a href="/log">View Full Log →</a>
            </div>
            <div id="log-widget"></div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/log.js"></script>
    <script src="/static/js/project.js"></script>
</body>
</html>
